<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poole Harbour Rivers - Linked Data Catchment Demonstrator</title>

  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="vendor/leaflet/MarkerCluster.css" />
  <link rel="stylesheet" href="vendor/leaflet/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="title">
      <h1>Poole Harbour Rivers - Linked Data Catchment Demonstrator</h1>
      <span class="subtitle">Water: the regulated world (limits · breaches · WINEP future works) &amp; the measured world (ambient monitoring) &nbsp;·&nbsp; Land: Sustainable Farming Incentive</span>
    </div>
    <div class="header-links">
      <a class="docs-link" href="docs.html" title="Project documentation">Docs</a>
      <a class="docs-link" href="sparql.html" title="SPARQL query editor">SPARQL</a>
    </div>
  </header>

  <nav id="views">
    <fieldset class="view-group water">
      <legend>Water</legend>
      <div class="group-buttons">
        <button data-view="regulated" class="active">
          <span class="v-title">The regulated world</span>
          <span class="v-desc">What a permit allows, what breached it, and what will replace it — limits, breaches &amp; WINEP future works</span>
        </button>
        <button data-view="measured">
          <span class="v-title">The measured world</span>
          <span class="v-desc">What the sampling actually finds — every point in the catchment, permitted or not</span>
        </button>
      </div>
    </fieldset>
    <fieldset class="view-group land">
      <legend>Land</legend>
      <div class="group-buttons">
        <button data-view="farming">
          <span class="v-title">Sustainable Farming Incentive</span>
          <span class="v-desc">SFI agreements, what they pay per intervention &amp; what they are modelled to remove</span>
        </button>
      </div>
      <label class="group-filter">Option type
        <select id="optionType"></select>
      </label>
    </fieldset>
    <fieldset class="view-group both">
      <legend>Water &amp; Land</legend>
      <label class="group-filter">Substance
        <select id="substance"></select>
        <span class="filter-note" id="substance-note"></span>
      </label>
    </fieldset>
  </nav>

  <p id="lede"></p>

  <div id="stage">
    <div id="map"></div>
    <aside id="chart" class="hidden">
      <div class="chart-head">
        <span id="chart-title"></span>
        <button id="chart-close" title="Close chart (full-screen map)">✕</button>
      </div>
      <div id="chart-body"></div>
    </aside>
  </div>

  <div id="legend" class="legend">
    <div id="legend-key" class="legend-key"></div>
    <div id="legend-desig" class="legend-desig"></div>
  </div>

  <section id="tables"></section>

  <footer>
    <span id="status">Loading…</span>
    <a class="foot-link" href="sparql.html" title="Open the SPARQL query editor">SPARQL over Oxigraph · <code>/sparql</code></a>
  </footer>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="vendor/leaflet/leaflet.markercluster.js"></script>
  <script src="vendor/proj4/proj4.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
