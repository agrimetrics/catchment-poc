<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poole Harbour Rivers - Linked Data Catchment Demonstrator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="title">
      <h1>Poole Harbour Rivers - Linked Data Catchment Demonstrator</h1>
      <span class="subtitle">Water: Breaches · Substance Views · WINEP (Water Industry National Environment Programme) &nbsp;·&nbsp; Land: Sustainable Farming Incentive</span>
    </div>
  </header>

  <nav id="views">
    <fieldset class="view-group water">
      <legend>Water</legend>
      <div class="group-buttons">
        <button data-view="breaches" class="active">
          <span class="v-title">Breaches</span>
          <span class="v-desc">Current &amp; past permit breaches on the map</span>
        </button>
        <button data-view="substance">
          <span class="v-title">Substance Views</span>
          <span class="v-desc">Current limits &amp; future works for the selected substance</span>
        </button>
        <button data-view="wessex">
          <span class="v-title">WINEP</span>
          <span class="v-desc">Water Industry National Environment Programme — proposed investments &amp; new limits</span>
        </button>
      </div>
      <label class="group-filter">Substance
        <select id="substance"></select>
      </label>
    </fieldset>
    <fieldset class="view-group land">
      <legend>Land</legend>
      <div class="group-buttons">
        <button data-view="farming">
          <span class="v-title">Sustainable Farming Incentive</span>
          <span class="v-desc">SFI agreements &amp; what they pay per intervention</span>
        </button>
      </div>
      <label class="group-filter">Option type
        <select id="optionType"></select>
      </label>
    </fieldset>
  </nav>

  <p id="lede"></p>

  <div id="stage">
    <div id="map"></div>
    <aside id="chart" class="hidden">
      <div class="chart-head">
        <span id="chart-title"></span>
        <button id="chart-close" title="Close chart (full-screen map)">✕</button>
      </div>
      <div id="chart-body"></div>
    </aside>
  </div>

  <div id="legend" class="legend"></div>

  <section id="tables"></section>

  <footer>
    <span id="status">Loading…</span>
    <span class="src">SPARQL over Oxigraph · <code>/sparql</code></span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/proj4@2.11.0/dist/proj4.js"></script>
  <script src="app.js"></script>
</body>
</html>
