<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poole Harbour Rivers - Linked Data Catchment Demonstrator</title>

  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="vendor/leaflet/MarkerCluster.css" />
  <link rel="stylesheet" href="vendor/leaflet/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="gov-crest" aria-hidden="true"></div>
    <div class="title">
      <h1>Poole Harbour Rivers - Linked Data Catchment Demonstrator</h1>
      <span class="subtitle">Water: the regulated world (limits · breaches · WINEP future works) &amp; the measured world (ambient monitoring) &nbsp;·&nbsp; Land: Sustainable Farming Incentive</span>
    </div>
    <div class="header-links">
      <a class="docs-link" href="docs.html" title="Project documentation">Docs</a>
      <a class="docs-link" href="sparql.html" title="SPARQL query editor">SPARQL</a>
    </div>
  </header>

  <nav id="views" class="app-nav" aria-label="Choose a view">
    <div class="app-nav__views">
      <span class="app-nav__group app-nav__group--water">Water</span>
      <button type="button" data-view="regulated" class="app-nav__link active"
        title="What a permit allows, what breached it, and what will replace it — limits, breaches &amp; WINEP future works">The regulated world</button>
      <button type="button" data-view="measured" class="app-nav__link"
        title="What the sampling actually finds — every point in the catchment, permitted or not">The measured world</button>
      <span class="app-nav__divider" aria-hidden="true"></span>
      <span class="app-nav__group app-nav__group--land">Land</span>
      <button type="button" data-view="farming" class="app-nav__link"
        title="SFI agreements, what they pay per intervention &amp; what they are modelled to remove">Sustainable Farming Incentive</button>
    </div>
    <div class="app-filters">
      <div class="app-filter app-filter--water">
        <label class="app-filter__label" for="waterbody">Waterbody catchment <span class="app-filter__scope app-filter__scope--water">water</span></label>
        <select id="waterbody"></select>
      </div>
      <div class="app-filter app-filter--land">
        <label class="app-filter__label" for="optionType">Option type <span class="app-filter__scope app-filter__scope--land">land</span></label>
        <select id="optionType"></select>
      </div>
      <div class="app-filter app-filter--both">
        <label class="app-filter__label" for="substance">Substance <span class="app-filter__scope app-filter__scope--both">water &amp; land</span></label>
        <select id="substance"></select>
        <span class="filter-note" id="substance-note"></span>
      </div>
    </div>
  </nav>

  <p id="lede"></p>

  <div id="stage">
    <div id="map"></div>
    <aside id="chart" class="hidden">
      <div class="chart-head">
        <div id="chart-tabs" class="chart-tabs"></div>
      </div>
      <div id="chart-body"></div>
    </aside>
  </div>

  <div id="legend" class="legend">
    <div id="legend-key" class="legend-key"></div>
    <div id="legend-desig" class="legend-desig"></div>
  </div>

  <section id="tables"></section>

  <footer>
    <span id="status">Loading…</span>
    <a class="foot-link" href="sparql.html" title="Open the SPARQL query editor">SPARQL over Oxigraph · <code>/sparql</code></a>
  </footer>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="vendor/leaflet/leaflet.markercluster.js"></script>
  <script src="vendor/proj4/proj4.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
