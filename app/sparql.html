<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPARQL · Poole Harbour Rivers Demonstrator</title>
  <meta name="description" content="SPARQL editor for the federated data layer" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="sparql.css" />

  <!-- Endpoint configuration (window.APP_CONFIG), shared with the map app. Classic script in <head>
       so it runs before the inline setup below. -->
  <script src="config.js"></script>
  <!-- SPARQL editor web component, vendored (mirrored esm.sh module closure) so the page loads only
       from this origin. See app/vendor/sparql-editor/. -->
  <script type="module" src="vendor/sparql-editor/sparql-editor.js"></script>
</head>
<body>
  <header>
    <div class="title">
      <h1>SPARQL</h1>
      <span class="subtitle">Query the federated data layer — regulation · WINEP · SFI · designations</span>
    </div>
    <a class="docs-link" href="index.html" title="Return to the map app">← Back to app</a>
  </header>

  <!-- Endpoint comes from config.js (window.APP_CONFIG.sparqlEndpoint); defaults to the same-origin
       /sparql served by app/server.py. Set it to your own endpoint/proxy for a static deployment. -->
  <sparql-editor></sparql-editor>
  <script>
    // The editor runs `new URL(endpoint)` internally, which rejects a relative path — a bare
    // endpoint="/sparql" fails silently with "/sparql is not a valid URL" and no query ever fires.
    // So resolve the configured endpoint to an *absolute* URL (a relative path resolves against this
    // origin; an absolute URL is used as-is). Setting the attribute alone isn't enough: YASGUI's first
    // tab is created with the relative default and ignores it, so also set each tab's endpoint once
    // YASGUI has initialised, and on any new tab.
    (function () {
      var raw = (window.APP_CONFIG && window.APP_CONFIG.sparqlEndpoint) || "/sparql";
      var ep = new URL(raw, location.origin).href;
      var ed = document.querySelector("sparql-editor");
      ed.setAttribute("endpoint", ep);
      // Deep link: a table's "◈ SPARQL" link arrives as #q=<url-encoded query>. Load it into the
      // active tab once YASGUI is up (applied once, so re-selecting the tab doesn't clobber edits).
      var deepQuery = null, deepApplied = false;
      if (location.hash.indexOf("#q=") === 0) {
        try { deepQuery = decodeURIComponent(location.hash.slice(3)); } catch (e) {}
      }
      function fixTab() {
        try {
          var t = ed.yasgui.getTab();
          if (t && t.setEndpoint && t.getRequestConfig().endpoint !== ep) t.setEndpoint(ep);
          if (t && deepQuery && !deepApplied && t.setQuery) { t.setQuery(deepQuery); deepApplied = true; }
        } catch (e) {}
      }
      var n = 0;
      var iv = setInterval(function () {
        var y = ed.yasgui;
        if (y && y.getTab && y.getTab()) {
          clearInterval(iv);
          fixTab();
          if (y.on) { y.on("tabSelect", fixTab); y.on("tabAdd", fixTab); }
        } else if (++n > 100) {
          clearInterval(iv);
        }
      }, 100);
    })();
  </script>
</body>
</html>
